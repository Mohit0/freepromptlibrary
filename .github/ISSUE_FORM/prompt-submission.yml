name: Prompt Submission
description: Submit an AI prompt with image or video — works on your phone, no git required
title: "Prompt: "
labels:
  - prompt-submission
body:
  - type: markdown
    attributes:
      value: |
        **Submit from your phone or laptop** — no fork, branch, or PR needed.

        1. Fill in the fields below
        2. **Attach your image or video** using the paperclip / attachment button (on mobile: pick from camera roll)
        3. Tap **Submit new issue** — a pull request is created automatically for review

        **Formats:** jpg, png, webp, gif, svg · mp4, webm, mov
  - type: input
    id: title
    attributes:
      label: Title
      description: Short descriptive title
      placeholder: Neon Alley in Rain
    validations:
      required: true
  - type: textarea
    id: prompt
    attributes:
      label: Prompt text
      description: The exact prompt you used to generate the output
    validations:
      required: true
  - type: dropdown
    id: type
    attributes:
      label: Media type
      options:
        - image
        - video
    validations:
      required: true
  - type: input
    id: tags
    attributes:
      label: Tags
      description: Comma-separated (e.g. cyberpunk, rain, night)
      placeholder: cyberpunk, rain, night
    validations:
      required: true
  - type: input
    id: contributor
    attributes:
      label: GitHub username
      description: Your GitHub handle without the @
      placeholder: your-username
    validations:
      required: true
