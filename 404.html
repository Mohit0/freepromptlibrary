<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <script>
    (function () {
      var parts = window.location.pathname.split("/").filter(Boolean);
      var root = parts.length ? "/" + parts[0] + "/" : "/";
      window.location.replace(root + window.location.search + window.location.hash);
    })();
  </script>
  <title>Redirecting…</title>
</head>
<body></body>
</html>
