<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <script>
    (function () {
      var path = window.location.pathname;
      if (path && !path.endsWith("/") && !/\.html$/i.test(path)) {
        window.location.replace(path + "/" + window.location.search + window.location.hash);
        return;
      }
      var basePath = path.endsWith("/") ? path : path.slice(0, path.lastIndexOf("/") + 1);
      var baseEl = document.createElement("base");
      baseEl.href = basePath || "/";
      document.head.appendChild(baseEl);
    })();
  </script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="View a shared AI prompt and its generated image or video.">
  <title>Prompt — Prompt Library</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="page-prompt">
  <header class="site-header site-header--compact">
    <nav class="nav">
      <a href="index.html" class="logo">
        <span class="logo-mark" aria-hidden="true">◇</span>
        Prompt Library
      </a>
      <div class="nav-links">
        <a href="index.html#gallery">Gallery</a>
        <a href="submit.html">Submit</a>
        <a href="https://github.com/" class="nav-github" target="_blank" rel="noopener noreferrer">GitHub</a>
      </div>
    </nav>
  </header>

  <main class="prompt-page" id="prompt-page">
    <div id="prompt-loading" class="prompt-loading">Loading prompt…</div>

    <div id="prompt-error" class="prompt-error" hidden>
      <div class="empty-icon" aria-hidden="true">◇</div>
      <h1>Prompt not found</h1>
      <p>This link may be broken or the prompt was removed.</p>
      <a href="index.html#gallery" class="btn btn-primary">Browse gallery</a>
    </div>

    <article id="prompt-content" class="prompt-content" hidden>
      <a href="index.html#gallery" class="back-link">← Back to gallery</a>

      <div class="prompt-layout">
        <div class="prompt-media-wrap">
          <div id="prompt-media" class="prompt-media"></div>
        </div>

        <div class="prompt-details">
          <div class="prompt-meta">
            <span class="badge" id="prompt-type"></span>
          </div>
          <h1 id="prompt-title"></h1>

          <div class="share-block">
            <label for="share-url" class="share-label">Share link</label>
            <div class="share-row">
              <input type="text" id="share-url" class="share-input" readonly>
              <button type="button" class="btn btn-primary" id="copy-link">Copy link</button>
            </div>
          </div>

          <div class="prompt-block">
            <div class="prompt-header">
              <h2>Prompt</h2>
              <button type="button" class="btn btn-small" id="copy-prompt">Copy prompt</button>
            </div>
            <pre id="prompt-text"></pre>
          </div>

          <div class="prompt-tags" id="prompt-tags"></div>
          <p class="prompt-contributor" id="prompt-contributor"></p>
        </div>
      </div>
    </article>
  </main>

  <footer class="site-footer">
    <p>Built for GitHub Pages · <a href="index.html#gallery">Browse gallery</a></p>
  </footer>

  <script id="prompts-inline" type="application/json">{"items":[{"id":"cinematic-portrait-001","title":"Cinematic Portrait","prompt":"Cinematic portrait of a woman in golden hour light, shallow depth of field, 85mm lens, warm tones, film grain, editorial fashion photography style","type":"image","media":"assets/images/cinematic-portrait.svg","tags":["portrait","cinematic","photography"],"contributor":"@example"},{"id":"neon-cityscape-002","title":"Neon Cityscape","prompt":"Futuristic cyberpunk city at night, neon signs reflecting on wet streets, aerial view, volumetric fog, ultra detailed, 8k, blade runner aesthetic","type":"image","media":"assets/images/neon-cityscape.svg","tags":["cyberpunk","cityscape","neon"],"contributor":"@example"},{"id":"product-macro-003","title":"Product Macro Shot","prompt":"Macro product photography of a minimalist watch on marble surface, soft studio lighting, high contrast shadows, commercial advertising style, clean composition","type":"image","media":"assets/images/product-macro.svg","tags":["product","macro","commercial"],"contributor":"@example"},{"id":"ocean-timelapse-004","title":"Ocean Timelapse","prompt":"Timelapse of ocean waves crashing on rocky coastline at sunset, dramatic clouds moving fast, cinematic color grading, 4K, smooth motion","type":"video","media":"assets/videos/ocean-timelapse.mp4","tags":["nature","timelapse","ocean"],"contributor":"@example"},{"id":"abstract-motion-005","title":"Abstract Motion","prompt":"Abstract fluid motion graphics, iridescent liquid metal shapes morphing slowly, dark background, loopable, high-end motion design, 16:9","type":"video","media":"assets/videos/abstract-motion.mp4","tags":["abstract","motion","3d"],"contributor":"@example"}]}</script>
  <script src="js/prompts-data.js"></script>
  <script src="js/prompt.js" type="module"></script>
</body>
</html>
